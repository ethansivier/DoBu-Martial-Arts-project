            <div class="col-md-9 col-lg-10 ms-sm-auto px-md-4 main-content">
                <div class="d-flex justify-content-between align-items-center flex-wrap flex-md-nowrap pt-3 mb-3 pb-2 border-bottom">
                    <h1 class="h2">Edit User Settings</h1>
                </div>
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="mb-3 card-title">Find User</h5>
                        <form class="row g-3">
                            <div class="col-md-8">
                                <div class="input-group"><span class="input-group-text"><svg class="bi bi-envelope" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" fill="currentColor" viewBox="0 0 16 16">
                                            <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1zm13 2.383-4.708 2.825L15 11.105zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741M1 11.105l4.708-2.897L1 5.383z"></path>
                                        </svg></span><input class="form-control" type="email" aria-label="User Email" placeholder="Enter user email address..."></div>
                            </div>
                            <div class="col-md-4"><button class="btn btn-primary w-100" type="submit">Search User</button></div>
                        </form>
                    </div>
                </div>
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h5 class="mb-4 card-title">Account Information</h5>
                        <form>
                            <div class="row mb-3">
                                <div class="col-md-6"><label class="form-label">Username</label><input class="form-control" type="text" placeholder="Current Username"></div>
                                <div class="col-md-6"><label class="form-label">New Password</label><input class="form-control" type="password" placeholder="Leave blank to keep current"></div>
                            </div>
                            <div class="mb-3"><label class="form-label d-block">Membership Level</label>
                                <div class="form-check form-check-inline"><input class="form-check-input" type="radio" id="planBasic" name="membership" value="basic"><label class="form-check-label" for="planBasic">Basic</label></div>
                                <div class="form-check form-check-inline"><input class="form-check-input" type="radio" checked="" id="planPro" name="membership" value="pro"><label class="form-check-label" for="planPro">Pro</label></div>
                                <div class="form-check form-check-inline"><input class="form-check-input" type="radio" id="planPremium" name="membership" value="premium"><label class="form-check-label" for="planPremium">Premium</label></div>
                            </div>
                            <div class="mb-4"><label class="form-label">Enrolled Sessions</label>
                                <div class="row g-2">
                                    <div class="col-sm-4">
                                        <div class="form-check"><input class="form-check-input" type="checkbox" id="session5"><label class="form-check-label" for="session5">a</label></div>
                                    </div>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mt-5 pt-3 border-top"><button class="btn btn-danger" type="button" data-bs-toggle="modal" data-bs-target="#deleteModal"><svg class="bi bi-trash3 me-1" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" fill="currentColor" viewBox="0 0 16 16">
                                        <path d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5M11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1zm1.958 1-.846 10.58a1 1 0 0 1-.997.92h-6.23a1 1 0 0 1-.997-.92L3.042 3.5zm-7.487 1a.5.5 0 0 1 .528.47l.5 8.5a.5.5 0 0 1-.998.06L5 5.03a.5.5 0 0 1 .47-.53Zm5.058 0a.5.5 0 0 1 .47.53l-.5 8.5a.5.5 0 1 1-.998-.06l.5-8.5a.5.5 0 0 1 .528-.47M8 4.5a.5.5 0 0 1 .5.5v8.5a.5.5 0 0 1-1 0V5a.5.5 0 0 1 .5-.5"></path>
                                    </svg> Delete Account </button><button class="btn btn-success px-5" type="submit">Save Changes</button></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" role="dialog" tabindex="-1" id="deleteModal" aria-labelledby="deleteModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-danger" id="deleteModalLabel">Delete Account?</h5><button class="btn-close" aria-label="Close" data-bs-dismiss="modal" type="button"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete this user's account? This action cannot be undone.</p>
                </div>
                <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal" type="button">Cancel</button><button class="btn btn-danger" type="button">Confirm Deletion</button></div>
            </div>
        </div>
    </div>
