            </div>
            <div class="col-md-9 col-lg-10 ms-sm-auto px-md-4 main-content">
                <div class="d-flex justify-content-between align-items-center flex-wrap flex-md-nowrap pt-3 mb-3 pb-2 border-bottom">
                    <h1 class="h2">Edit Membership Plans</h1>
                </div>
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="mb-3 card-title">Select Plan to Edit</h5>
                        <div class="row">
                            <div class="col-md-6"><select class="form-select" id="planSelector">
                                    <option value="" selected="">Choose a plan...</option>
                                    <option value="basic">Basic Plan</option>
                                    <option value="pro">Pro Plan</option>
                                    <option value="premium">Premium Plan</option>
                                    <option value="kids">Kids Special</option>
                                </select></div>
                        </div>
                    </div>
                </div>
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h5 class="mb-4 card-title">Plan Details</h5>
                        <form>
                            <div class="row mb-3 g-3">
                                <div class="col-md-6"><label class="form-label" for="planName">Plan Name</label><input class="form-control" type="text" id="planName" placeholder="e.g. Pro Plan"></div>
                                <div class="col-md-6"><label class="form-label" for="">Price ($)</label>
                                    <div class="input-group"><span class="input-group-text">$</span><input class="form-control" type="number" id="planPrice" placeholder="49.99" step="0.01"></div>
                                </div>
                            </div>
                            <div class="row mb-3 g-3">
                                <div class="col-md-6"><label class="form-label" for="martialArtsCount">Martial Arts Classes Count</label><input class="form-control" type="number" id="martialArtsCount" placeholder="Number of classes included"></div>
                                <div class="col-md-6"><label class="form-label" for="sessionsCount">General Sessions Count</label><input class="form-control" type="number" id="sessionsCount" placeholder="Number of sessions included"></div>
                            </div>
                            <div class="mt-4 mb-4">
                                <div class="form-check form-switch"><input type="checkbox" class="form-check-input" id="isKidsPlan"><label class="form-check-label" for="isKidsPlan">This is for Kids</label>
                                    <div class="form-text"><span>Enable this if the plan is intended for children.</span></div>
                                </div>
                            </div>
                            <div class="d-flex justify-content-end gap-2 pt-3 border-top"><button class="btn btn-outline-secondary" type="reset">Discard Changes</button><button class="btn btn-primary px-4" type="submit">Update Plan</button></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
